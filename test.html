<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Navbar with Background Image</title>

    <!-- Tailwind CSS v4 Browser CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font (Optional but recommended for layout presentation) -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
      body {
        font-family: 'Poppins', sans-serif;
      }
    </style>
  </head>
  <body class="bg-gray-100 min-h-screen">

    <!-- 
      NAVBAR WITH STATIC BACKGROUND PICTURE
      Replace 'your-background-image-url.jpg' with your actual image file path or URL.
    -->
    <nav class="relative w-full h-24 bg-cover bg-center bg-no-repeat shadow-md" 
         style="background-image: url('Assets/steptodown.com108676.jpg');">
      
      <!-- Optional Overlay to ensure text readability against the background image -->
      <div class="absolute inset-0 bg-black/30 backdrop-blur-[2px]"></div>

      <!-- Main Navbar Container -->
      <div class="relative z-10 max-w-7xl mx-auto h-full px-4 sm:px-6 lg:px-8 flex items-center justify-between">
        
        <!-- 
          LEFT SIDE: CLICKABLE LOGO (FIXED SIZE)
          Replace 'your-logo-file.png' with your actual logo path.
        -->
        <a href="#" class="flex items-center shrink-0">
          <img src="Assets/Logo.svg" alt="Company Logo" class="w-90 h-30 object-contain" />
        </a>

        <!-- RIGHT SIDE: DESKTOP NAVIGATION MENUS (Hidden on mobile, flex on md screens and up) -->
        <div class="hidden md:flex items-center gap-8">
          <a href="#home" class="text-sm font-semibold tracking-wide text-white hover:text-blue-300 transition-colors uppercase">Home</a>
          <a href="#about" class="text-sm font-medium tracking-wide text-white hover:text-blue-300 transition-colors uppercase">About us</a>
          <a href="#gallery" class="text-sm font-medium tracking-wide text-white hover:text-blue-300 transition-colors uppercase">Gallery</a>
          <a href="#career" class="text-sm font-medium tracking-wide text-white hover:text-blue-300 transition-colors uppercase">Career</a>
          <a href="#contact" class="px-4 py-2 text-sm font-semibold tracking-wide text-white bg-blue-600 hover:bg-blue-700 rounded transition-all uppercase">Contact us</a>
        </div>

        <!-- MOBILE MENU BUTTON (Visible only on mobile devices) -->
        <div class="flex items-center md:hidden">
          <button id="mobile-menu-btn" class="text-white hover:text-blue-300 focus:outline-none p-2 transition-colors" aria-label="Toggle Menu">
            <!-- Hamburger Icon Open -->
            <svg id="menu-icon-open" class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
            <!-- Close Icon (Hidden by default) -->
            <svg id="menu-icon-close" class="w-7 h-7 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>

      </div>

      <!-- MOBILE DROPDOWN MENU PANEL (Hidden by default, toggled via JavaScript) -->
      <div id="mobile-dropdown" class="hidden absolute top-24 left-0 w-full bg-slate-900/95 backdrop-blur-md border-t border-white/10 z-20 shadow-xl md:hidden transition-all duration-300">
        <div class="px-4 py-4 space-y-3 flex flex-col">
          <a href="#home" class="text-base font-medium text-white hover:bg-white/10 px-3 py-2 rounded transition-all">Home</a>
          <a href="#about" class="text-base font-medium text-white hover:bg-white/10 px-3 py-2 rounded transition-all">About us</a>
          <a href="#gallery" class="text-base font-medium text-white hover:bg-white/10 px-3 py-2 rounded transition-all">Gallery</a>
          <a href="#career" class="text-base font-medium text-white hover:bg-white/10 px-3 py-2 rounded transition-all">Career</a>
          <a href="#contact" class="text-center bg-blue-600 text-white font-medium py-2 rounded hover:bg-blue-700 transition-all">Contact us</a>
        </div>
      </div>

    </nav>

    <!-- Simple JavaScript for Responsive Mobile Menu Interaction -->
    <script>
      const menuBtn = document.getElementById('mobile-menu-btn');
      const mobileDropdown = document.getElementById('mobile-dropdown');
      const openIcon = document.getElementById('menu-icon-open');
      const closeIcon = document.getElementById('menu-icon-close');

      menuBtn.addEventListener('click', () => {
        // Toggle dropdown menu visibility
        mobileDropdown.classList.toggle('hidden');
        
        // Toggle SVG icons back and forth
        openIcon.classList.toggle('hidden');
        closeIcon.classList.toggle('hidden');
      });
    </script>

  </body>
</html>
